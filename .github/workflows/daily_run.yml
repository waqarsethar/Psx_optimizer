name: Daily PSX Portfolio Optimizer

on:
  schedule:
    # Runs at 11:00 UTC (16:00 PKT) Monday through Friday
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allows you to trigger it manually via the UI to test

jobs:
  run-optimizer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Removed the cache line because dependencies are installed inline below

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy psxdata requests

      - name: Execute Optimization and Notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
